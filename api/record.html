<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
    </head>
    <body>
        <pre id="data"></pre>
        <script>
            const hash = window.parent
                ? window.parent.location.hash.substring(1)
                : "";
            const params = new URLSearchParams(window.location.search);
            const id = parseInt(params.get("id"));

            if (!hash) {
                document.getElementById("data").textContent = JSON.stringify(
                    {
                        success: false,
                        error: "No database found",
                    },
                    null,
                    2,
                );
            } else if (!id) {
                document.getElementById("data").textContent = JSON.stringify(
                    {
                        success: false,
                        error: "Missing id parameter",
                    },
                    null,
                    2,
                );
            } else {
                try {
                    const data = JSON.parse(decodeURIComponent(atob(hash)));
                    const record = (data.records || []).find(
                        (r) => r.id === id,
                    );

                    document.getElementById("data").textContent =
                        JSON.stringify(
                            {
                                success: true,
                                data: record || null,
                            },
                            null,
                            2,
                        );
                } catch (e) {
                    document.getElementById("data").textContent =
                        JSON.stringify(
                            {
                                success: false,
                                error: "Invalid database format",
                            },
                            null,
                            2,
                        );
                }
            }
        </script>
    </body>
</html>
