<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ECDB API Endpoint</title>
</head>
<body>
    <pre id="json" style="display: none;"></pre>
    <script>
        // This file acts as a JSON API endpoint
        // When accessed, it reads the hash from the main page
        
        // Get the hash from parent URL
        const hash = window.location.hash.substring(1);
        
        if (!hash) {
            // Return default data
            const defaultData = {
                success: true,
                message: "No hash provided. Visit the main app first.",
                data: []
            };
            document.getElementById('json').textContent = JSON.stringify(defaultData, null, 2);
        } else {
            try {
                // Decode the hash
                const decoded = decodeURIComponent(atob(hash));
                const data = JSON.parse(decoded);
                
                // Parse URL for specific requests
                const urlParams = new URLSearchParams(window.location.search);
                const id = urlParams.get('id');
                
                let response;
                
                if (id) {
                    // Return specific record
                    const record = data.records.find(r => r.id == id);
                    response = {
                        success: true,
                        data: record || null
                    };
                } else {
                    // Return all records
                    response = {
                        success: true,
                        count: data.records.length,
                        timestamp: data.t,
                        data: data.records
                    };
                }
                
                document.getElementById('json').textContent = JSON.stringify(response, null, 2);
            } catch (e) {
                document.getElementById('json').textContent = JSON.stringify({
                    success: false,
                    error: "Invalid hash data"
                }, null, 2);
            }
        }
        
        // Set content type to JSON
        document.head.innerHTML += '<meta http-equiv="Content-Type" content="application/json; charset=utf-8">';
        
        // Display JSON
        document.body.style.backgroundColor = '#f5f5f5';
        document.body.style.fontFamily = 'monospace';
        document.body.style.padding = '20px';
        document.getElementById('json').style.display = 'block';
        document.getElementById('json').style.whiteSpace = 'pre-wrap';
        document.getElementById('json').style.wordWrap = 'break-word';
    </script>
</body>
</html>
